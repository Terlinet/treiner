  <base href="$FLUTTER_BASE_HREF">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <meta name="description" content="Sua IA Personal Trainer oficial da Panobianco. Treine com inteligência artificial e visão computacional.">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://terlinet.github.io/treiner/">
  <meta property="og:title" content="TerlineT Treiner - IA Personal Trainer">
  <meta property="og:description" content="Treine com a TerlineT, a inteligência artificial que conta suas repetições e te motiva em tempo real usando a câmera do seu celular.">
  <meta property="og:image" content="https://terlinet.github.io/treiner/assets/assets/images/preview.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://terlinet.github.io/treiner/">
  <meta property="twitter:title" content="TerlineT Treiner - IA Personal Trainer">
  <meta property="twitter:description" content="Treine com a TerlineT, a inteligência artificial que conta suas repetições e te motiva em tempo real usando a câmera do seu celular.">
  <meta property="twitter:image" content="https://terlinet.github.io/treiner/assets/assets/images/preview.png">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏋🏽‍♂️</text></svg>">
  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }
    /* O vídeo será posicionado absolutamente atrás do canvas do Flutter */
    #pose-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    /* Garante que o canvas do Flutter fique sobre o vídeo */
    flutter-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <script>
    // Função que será chamada pelo Dart para iniciar o MediaPipe
    function initMediaPipe(videoElementId) {
      const videoElement = document.getElementById(videoElementId);
      if (!videoElement) {
        console.error("Elemento de vídeo não encontrado:", videoElementId);
        return;
      }

      const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        if (results.poseLandmarks && window.onPoseDetected) {
          // Converte os landmarks para um formato simples (x, y, z, visibility)
          const landmarks = results.poseLandmarks.map(lm => ({
            x: lm.x,
            y: lm.y,
            z: lm.z,
            visibility: lm.visibility
          }));
          window.onPoseDetected(JSON.stringify(landmarks));
        }
      });

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({ image: videoElement });
        },
        width: 640,
        height: 480
      });
      camera.start();
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
