<!DOCTYPE html>
<html>
<head>
  <base href="/treiner/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TerlineT Treiner</title>
  <!-- MediaPipe Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background-color: black;
    }
    /* O vídeo será posicionado absolutamente atrás do canvas do Flutter */
    #pose-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    /* Garante que o canvas do Flutter fique sobre o vídeo */
    flutter-view {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
  </style>
</head>
<body>
  <script>
    // Função que será chamada pelo Dart para iniciar o MediaPipe
    function initMediaPipe(videoElementId) {
      const videoElement = document.getElementById(videoElementId);
      if (!videoElement) {
        console.error("Elemento de vídeo não encontrado:", videoElementId);
        return;
      }

      const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        if (results.poseLandmarks && window.onPoseDetected) {
          // Converte os landmarks para um formato simples (x, y, z, visibility)
          const landmarks = results.poseLandmarks.map(lm => ({
            x: lm.x,
            y: lm.y,
            z: lm.z,
            visibility: lm.visibility
          }));
          window.onPoseDetected(JSON.stringify(landmarks));
        }
      });

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({ image: videoElement });
        },
        width: 640,
        height: 480
      });
      camera.start();
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
