<!DOCTYPE html>
<html>
<head>
  <base href="/treiner/">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>TerlineT Treiner</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script>
    // Ponte global para enviar landmarks para o Flutter
    window.onPoseDetected = null;

    function initMediaPipe(videoElementId) {
      console.log("Inicializando MediaPipe para o elemento:", videoElementId);
      const videoElement = document.getElementById(videoElementId) || document.querySelector('video');

      if (!videoElement) {
        console.error("Elemento de vídeo não encontrado");
        return;
      }

      const pose = new Pose({
        locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
      });

      pose.setOptions({
        modelComplexity: 1,
        smoothLandmarks: true,
        enableSegmentation: false,
        minDetectionConfidence: 0.5,
        minTrackingConfidence: 0.5
      });

      pose.onResults((results) => {
        if (results.poseLandmarks && window.onPoseDetected) {
          // Envia os landmarks como JSON para o Flutter
          const landmarks = results.poseLandmarks.map(lm => ({
            x: lm.x,
            y: lm.y,
            z: lm.z,
            visibility: lm.visibility
          }));
          window.onPoseDetected(JSON.stringify(landmarks));
        }
      });

      const camera = new Camera(videoElement, {
        onFrame: async () => {
          await pose.send({ image: videoElement });
        },
        width: 640,
        height: 480
      });
      camera.start();
    }
  </script>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
